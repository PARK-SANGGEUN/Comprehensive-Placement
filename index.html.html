function bh(l,d,t){
  const p=s=>parseInt(s,16);
  const r=Math.max(0,Math.min(255,Math.round(p(l.slice(1,3))*(1-t)+p(d.slice(1,3))*t)));
  const g=Math.max(0,Math.min(255,Math.round(p(l.slice(3,5))*(1-t)+p(d.slice(3,5))*t)));
  const b=Math.max(0,Math.min(255,Math.round(p(l.slice(5,7))*(1-t)+p(d.slice(5,7))*t)));
  return `rgb(${r},${g},${b})`;
}

const dcache={};
async function getRegionData(region){
  if(dcache[region]) return dcache[region];
  const bin=atob(RAW[region]);
  const u8=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) u8[i]=bin.charCodeAt(i);
  const ds=new DecompressionStream("gzip");
  const w=ds.writable.getWriter(); w.write(u8); w.close();
  const chunks=[]; const reader=ds.readable.getReader();
  while(true){const {done,value}=await reader.read();if(done)break;chunks.push(value);}
  const total=chunks.reduce((s,c)=>s+c.length,0);
  const out=new Uint8Array(total); let off=0;
  for(const c of chunks){out.set(c,off);off+=c.length;}
  const d=JSON.parse(new TextDecoder().decode(out));
  dcache[region]=d; return d;
}

/* SVG 차트 */
function SvgChart({data,series,scoreLabel,type}){
  const W=720,H=280,PL=40,PR=20,PT=12,PB=58;
  const cW=W-PL-PR,cH=H-PT-PB;
  if(!data.length||!series.length) return null;
  const maxY=Math.max(1,...data.flatMap(d=>series.map(s=>d[s.key]||0)));
  const ySteps=4;
  const xS=i=>PL+i*(cW/Math.max(data.length-1,1));
  const yS=v=>PT+cH-(v/maxY)*cH;
  const bW=Math.max(2,Math.min(10,cW/data.length/series.length-0.5));
  const skip=Math.ceil(data.length/16);
  return e("svg",{viewBox:`0 0 ${W} ${H}`,style:{width:"100%",height:"auto",display:"block"}},
    [
      /* 배경 */
      e("rect",{key:"bg",x:0,y:0,width:W,height:H,fill:"#F8FAFC"}),
      /* Y 격자 */
      ...Array.from({length:ySteps+1},(_,i)=>{
        const v=Math.round(maxY*i/ySteps);
        return e("g",{key:"y"+i},[
          e("line",{key:"l",x1:PL,y1:yS(v),x2:W-PR,y2:yS(v),stroke:"#E2E8F0",strokeWidth:1}),
          e("text",{key:"t",x:PL-5,y:yS(v)+4,fontSize:9,fill:"#64748B",textAnchor:"end"},v)
        ]);
      }),
      /* X 레이블 */
      ...data.map((d,i)=>i%skip===0
        ? e("text",{key:"x"+i,x:xS(i),y:H-PB+16,fontSize:8,fill:"#64748B",textAnchor:"middle"},d.score)
        : null
      ).filter(Boolean),
      /* X축 레이블 */
      e("text",{key:"xl",x:W/2,y:H-4,fontSize:9,fill:"#94A3B8",textAnchor:"middle"},"\u2190 우수 \u00B7 "+scoreLabel+" \u00B7 불리 \u2192"),
      /* 축선 */
      e("line",{key:"ax",x1:PL,y1:PT,x2:PL,y2:H-PB,stroke:"#CBD5E1",strokeWidth:1}),
      e("line",{key:"ay",x1:PL,y1:H-PB,x2:W-PR,y2:H-PB,stroke:"#CBD5E1",strokeWidth:1}),
      /* 데이터 */
      type==="bar"
        ? data.flatMap((d,xi)=>series.map((s,si)=>{
            const val=d[s.key]||0; if(!val) return null;
            const bx=xS(xi)-(series.length*bW/2)+si*bW;
            const bh2=Math.max(1,(val/maxY)*cH);
            return e("rect",{key:s.key+xi,x:bx,y:yS(val),width:bW-0.5,height:bh2,fill:s.color,rx:1,opacity:0.88});
          }).filter(Boolean))
        : series.map(s=>{
            const pts=data.map((d,i)=>`${i===0?"M":"L"}${xS(i).toFixed(1)},${yS(d[s.key]||0).toFixed(1)}`);
            return e("path",{key:s.key,d:pts.join(" "),fill:"none",stroke:s.color,strokeWidth:2,opacity:0.88});
          }),
      /* 범례 */
      series.map((s,i)=>e("g",{key:"leg"+i,transform:`translate(${PL+i*105},${H-PB+30})`},[
        e("rect",{key:"r",width:10,height:10,fill:s.color,rx:2}),
        e("text",{key:"t",x:14,y:9,fontSize:9,fill:"#374151"},s.key)
      ]))
    ].flat()
  );
}

function App(){
  const [region,setRegion]=useState("강원");
  const [univ,setUniv]=useState(UNIVS["강원"][0]||"");
  const [kye,setKye]=useState("인문");
  const [view,setView]=useState("table");
  const [chartType,setChartType]=useState("bar");
  const [selYears,setSelYears]=useState([2023,2024,2025,2026]);
  const [showPass,setShowPass]=useState(true);
  const [showFail,setShowFail]=useState(true);
  const [loading,setLoading]=useState(true);
  const [data,setData]=useState(null);

  useEffect(()=>{
    setLoading(true);setData(null);
    getRegionData(region).then(d=>{setData(d);setLoading(false);});
  },[region]);

  useEffect(()=>{
    const l=UNIVS[region]||[];
    if(!l.includes(univ)) setUniv(l[0]||"");
  },[region]);

  const univList=UNIVS[region]||[];
  const rows=useMemo(()=>{
    if(!data||!univ) return [];
    return data.rows.filter(r=>r[1]===univ&&r[2]===kye&&selYears.includes(r[5]));
  },[data,univ,kye,selYears]);

  const combos=useMemo(()=>{
    const seen=new Set(),list=[];
    rows.forEach(r=>{const k=r[3]+"||"+r[4];if(!seen.has(k)){seen.add(k);list.push({sub:r[3],dept:r[4]});}});
    return list.sort((a,b)=>a.sub.localeCompare(b.sub)||a.dept.localeCompare(b.dept));
  },[rows]);

  const allScores=useMemo(()=>[...new Set(rows.map(r=>r[7]))].sort((a,b)=>a-b),[rows]);

  const pivot=useMemo(()=>{
    const m={};
    rows.forEach(r=>{const k=`${r[3]}||${r[4]}||${r[5]}||${r[6]}||${r[7]}`;m[k]=(m[k]||0)+r[8];});
    return m;
  },[rows]);

  const gv=useCallback((sub,dept,yr,pass,sc)=>pivot[`${sub}||${dept}||${yr}||${pass}||${sc}`]||0,[pivot]);

  const cellSt=useCallback((val,pass,yr)=>{
    if(!val) return {background:"#F8FAFC",color:"#F8FAFC"};
    const t=Math.min(val,5)/5;
    const bg=bh(YC[yr][pass==="pass"?"pl":"fl"],YC[yr][pass==="pass"?"p":"f"],t*0.75);
    const col=t>0.5?"#fff":pass==="pass"?YC[yr].p:YC[yr].f;
    return {background:bg,color:col,fontWeight:"700"};
  },[]);

  const chartData=useMemo(()=>allScores.map(sc=>{
    const o={score:sc.toFixed(1)};
    YEARS.filter(y=>selYears.includes(y)).forEach(yr=>{
      let p=0,f=0;
      combos.forEach(({sub,dept})=>{p+=gv(sub,dept,yr,"pass",sc);f+=gv(sub,dept,yr,"fail",sc);});
      if(showPass) o[`${yr}합격`]=p||0;
      if(showFail) o[`${yr}불합격`]=f||0;
    });
    return o;
  }),[allScores,combos,pivot,selYears,showPass,showFail]);

  const series=useMemo(()=>{
    const s=[];
    YEARS.filter(y=>selYears.includes(y)).forEach(yr=>{
      if(showPass) s.push({key:`${yr}합격`,color:YC[yr].p});
      if(showFail) s.push({key:`${yr}불합격`,color:YC[yr].f});
    });
    return s;
  },[selYears,showPass,showFail]);

  const scoreLabel=kye==="인문"?"국수영사":"국영수과";

  const btn=(a,c,sm)=>({
    padding:sm?"3px 10px":"5px 14px",borderRadius:6,border:a?"none":"1px solid #D1D5DB",
    cursor:"pointer",fontSize:sm?11:12,fontWeight:700,
    background:a?c:"#fff",color:a?"#fff":"#374151",
    boxShadow:a?"0 1px 4px "+c+"55":"none"
  });

  const pairs=selYears.flatMap(yr=>{
    const r=[];
    if(showPass) r.push({yr,pass:"pass",label:"합격",hdr:YC[yr].phdr});
    if(showFail) r.push({yr,pass:"fail",label:"불합격",hdr:YC[yr].fhdr});
    return r;
  });

  return e("div",{style:{background:"#F1F5F9",height:"100vh",color:"#1E293B",
    display:"flex",flexDirection:"column",overflow:"hidden",fontFamily:"system-ui,sans-serif"}},[

    /* ── 헤더 */
    e("div",{key:"hdr",style:{background:"#1E3A8A",padding:"9px 16px",
      display:"flex",alignItems:"center",gap:12,flexWrap:"wrap",flexShrink:0,
      boxShadow:"0 2px 8px #00000030"}},[
      e("div",{key:"t"},[
        e("div",{key:"tl",style:{fontSize:15,fontWeight:800,color:"#fff",letterSpacing:"-0.3px"}},"📊 종합전형 배치표"),
        e("div",{key:"sb",style:{fontSize:10,color:"#BFDBFE",marginTop:1}},"강원·서울·경기·인천 | 2023~2026 | 파랑=합격(충원합격포함) · 빨강=불합격")
      ]),
      e("div",{key:"vt",style:{marginLeft:"auto",display:"flex",gap:6}},
        [["table","📋 배치표"],["chart","📈 차트"]].map(([v,l])=>
          e("button",{key:v,onClick:()=>setView(v),style:{
            padding:"4px 12px",borderRadius:6,border:"none",cursor:"pointer",
            fontSize:12,fontWeight:700,
            background:view===v?"#fff":"#3B82F6",
            color:view===v?"#1E3A8A":"#fff"
          }},l)))
    ]),

    /* ── 필터 */
    e("div",{key:"flt",style:{background:"#fff",borderBottom:"1px solid #E2E8F0",
      padding:"8px 16px",display:"flex",gap:12,flexWrap:"wrap",alignItems:"center",
      flexShrink:0,boxShadow:"0 1px 3px #00000010"}},[
      e("div",{key:"reg",style:{display:"flex",alignItems:"center",gap:5}},[
        e("span",{key:"l",style:{fontSize:11,color:"#64748B",minWidth:28,fontWeight:600}},"지역"),
        ...["서울","경기·인천","강원"].map(r=>e("button",{key:r,onClick:()=>setRegion(r),style:btn(region===r,"#2563EB",true)},r))
      ]),
      e("div",{key:"sep1",style:{width:1,height:24,background:"#E2E8F0"}}),
      e("div",{key:"unv",style:{display:"flex",alignItems:"center",gap:5}},[
        e("span",{key:"l",style:{fontSize:11,color:"#64748B",minWidth:28,fontWeight:600}},"대학"),
        e("select",{key:"s",value:univ,onChange:ev=>setUniv(ev.target.value),style:{
          background:"#fff",color:"#1E293B",border:"1px solid #CBD5E1",
          borderRadius:6,padding:"4px 10px",fontSize:12,cursor:"pointer",maxWidth:220,
          boxShadow:"0 1px 2px #00000010"}},
          univList.map(u=>e("option",{key:u,value:u},u)))
      ]),
      e("div",{key:"sep2",style:{width:1,height:24,background:"#E2E8F0"}}),
      e("div",{key:"kye",style:{display:"flex",alignItems:"center",gap:5}},[
        e("span",{key:"l",style:{fontSize:11,color:"#64748B",minWidth:28,fontWeight:600}},"계열"),
        ...["인문","자연"].map(k=>e("button",{key:k,onClick:()=>setKye(k),style:btn(kye===k,"#7C3AED",true)},k))
      ]),
      e("div",{key:"sep3",style:{width:1,height:24,background:"#E2E8F0"}}),
      e("div",{key:"yr",style:{display:"flex",alignItems:"center",gap:5}},[
        e("span",{key:"l",style:{fontSize:11,color:"#64748B",minWidth:36,fontWeight:600}},"학년도"),
        ...YEARS.map(yr=>e("button",{key:yr,
          onClick:()=>setSelYears(p=>p.includes(yr)?p.filter(y=>y!==yr):[...p,yr].sort()),
          style:btn(selYears.includes(yr),YC[yr].p,true)},yr))
      ]),
      e("div",{key:"sep4",style:{width:1,height:24,background:"#E2E8F0"}}),
      e("div",{key:"pf",style:{display:"flex",alignItems:"center",gap:5}},[
        e("span",{key:"l",style:{fontSize:11,color:"#64748B",minWidth:28,fontWeight:600}},"표시"),
        e("button",{key:"p",onClick:()=>setShowPass(p=>!p),style:btn(showPass,"#1D4ED8",true)},"합격"),
        e("button",{key:"f",onClick:()=>setShowFail(p=>!p),style:btn(showFail,"#DC2626",true)},"불합격")
      ])
    ]),

    /* ── 서브헤더 */
    e("div",{key:"info",style:{background:"#EFF6FF",borderBottom:"2px solid #BFDBFE",
      padding:"5px 16px",display:"flex",alignItems:"center",gap:10,flexWrap:"wrap",flexShrink:0}},[
      e("span",{key:"u",style:{fontSize:13,fontWeight:800,color:"#1E3A8A"}},univ||"—"),
      e("span",{key:"d",style:{fontSize:11,color:"#3B82F6",fontWeight:600}},
        `${kye}계열 | ${scoreLabel} (0.1단위) | ${combos.length}개 전형`),
      e("div",{key:"leg",style:{marginLeft:"auto",display:"flex",gap:8,alignItems:"center"}},
        [...selYears.map(yr=>e("div",{key:yr,style:{display:"flex",alignItems:"center",gap:3,fontSize:10,color:"#475569"}},[
          e("span",{key:"p",style:{width:10,height:10,borderRadius:2,background:YC[yr].p,display:"inline-block",border:"1px solid #00000015"}}),
          e("span",{key:"f",style:{width:10,height:10,borderRadius:2,background:YC[yr].f,display:"inline-block",border:"1px solid #00000015"}}),
          e("b",{key:"y",style:{color:"#1E293B",fontWeight:700}},yr)
        ])),
        e("span",{key:"h",style:{fontSize:10,color:"#94A3B8",marginLeft:4}},"\u2190 우수  불리 \u2192")]
      )
    ]),

    /* ── 본문 */
    loading
      ? e("div",{key:"ld",style:{flex:1,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:12,background:"#F8FAFC"}},[
          e("div",{key:"sp",style:{width:32,height:32,border:"3px solid #BFDBFE",borderTopColor:"#1D4ED8",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}),
          e("div",{key:"s",style:{fontSize:12,color:"#64748B",fontWeight:600}},"데이터 로딩 중...")
        ])
      : combos.length===0
        ? e("div",{key:"em",style:{flex:1,display:"flex",alignItems:"center",justifyContent:"center",color:"#94A3B8",fontSize:13,background:"#F8FAFC"}},"해당 조건의 데이터가 없습니다.")
        : view==="table"
          ? e("div",{key:"tv",style:{flex:1,overflow:"auto"}},
              e(TableView,{combos,allScores,selYears,showPass,showFail,gv,cellSt,pairs}))
          : e("div",{key:"cv",style:{flex:1,overflow:"auto",padding:"16px 18px",background:"#F8FAFC"}},
              e(ChartView,{chartData,series,selYears,showPass,showFail,chartType,setChartType,combos,allScores,gv,scoreLabel}))
  ]);
}

function TableView({combos,allScores,selYears,showPass,showFail,gv,cellSt,pairs}){
  const nP=pairs.length;
  if(!nP) return e("div",{style:{padding:20,color:"#94A3B8"}},"표시 항목을 선택하세요.");

  /* 조합별 교대 배경색 */
  const comboBg=ci=>ci%2===0?"#FFFFFF":"#F8FAFC";

  const thBase={
    position:"sticky",top:0,background:"#1E3A8A",color:"#fff",
    fontSize:10,padding:"6px 4px",textAlign:"center",
    border:"1px solid #2D4F9E",whiteSpace:"nowrap",zIndex:10,fontWeight:700
  };

  return e("div",{style:{width:"100%",height:"100%",overflow:"auto",position:"relative"}},
    e("table",{style:{borderCollapse:"collapse",fontSize:11,minWidth:"max-content",tableLayout:"fixed"}},[
      /* 헤더 */
      e("thead",{key:"th",style:{position:"sticky",top:0,zIndex:30}},
        e("tr",null,[
          e("th",{key:"sub",style:{...thBase,position:"sticky",left:0,zIndex:40,
            minWidth:130,maxWidth:130,background:"#1E3A8A",borderRight:"2px solid #60A5FA"}},"세부유형"),
          e("th",{key:"dept",style:{...thBase,position:"sticky",left:130,zIndex:40,
            minWidth:140,maxWidth:140,background:"#1E3A8A",borderRight:"3px solid #93C5FD"}},"모집단위"),
          e("th",{key:"yr",style:{...thBase,minWidth:72,background:"#1E3A8A"}},"학년도"),
          ...allScores.map(sc=>e("th",{key:sc,style:{...thBase,minWidth:30,fontFamily:"monospace",
            fontSize:9,background:"#1E3A8A",padding:"6px 2px"}},sc.toFixed(1)))
        ])
      ),
      /* 바디 */
      e("tbody",{key:"tb"},
        combos.flatMap(({sub,dept},ci)=>
          pairs.map(({yr,pass,label,hdr},pi)=>{
            const isFirst=pi===0;
            const isLastOfCombo=pi===nP-1;
            const isYrFirst=pass==="pass"||!showPass;
            /* 조합 구분: 첫행 위, 마지막행 아래에 두꺼운 선 */
            const topBorder=isFirst?"2px solid #94A3B8":isYrFirst?"1px solid #CBD5E1":"1px solid #E2E8F0";
            const botBorder=isLastOfCombo?"2px solid #94A3B8":"none";
            const rowBg=pass==="pass"
              ? (ci%2===0?"#EFF6FF":"#DBEAFE10")
              : (ci%2===0?"#FFF5F5":"#FEE2E210");

            return e("tr",{key:`${ci}-${yr}-${pass}`,style:{background:rowBg}},[
              /* 세부유형 - 조합 전체 병합 */
              isFirst&&e("td",{key:"s",rowSpan:nP,style:{
                position:"sticky",left:0,zIndex:5,
                background:ci%2===0?"#EFF6FF":"#F0F9FF",
                padding:"4px 8px",fontSize:10,fontWeight:700,color:"#1D4ED8",
                borderRight:"2px solid #BFDBFE",
                borderTop:topBorder,borderBottom:botBorder,
                verticalAlign:"middle",textAlign:"center",
                wordBreak:"break-all",width:130,maxWidth:130,
                boxShadow:"2px 0 4px #00000010"
              }},sub),
              /* 모집단위 - 조합 전체 병합 */
              isFirst&&e("td",{key:"d",rowSpan:nP,style:{
                position:"sticky",left:130,zIndex:5,
                background:ci%2===0?"#fff":"#F8FAFC",
                padding:"4px 8px",fontSize:10,fontWeight:600,color:"#1E293B",
                borderRight:"3px solid #CBD5E1",
                borderTop:topBorder,borderBottom:botBorder,
                verticalAlign:"middle",wordBreak:"keep-all",
                width:140,maxWidth:140,
                boxShadow:"2px 0 6px #00000015"
              }},dept),
              /* 학년도 레이블 */
              e("td",{key:"yr",style:{
                padding:"2px 4px",textAlign:"center",fontSize:10,fontWeight:800,
                color:"#fff",background:hdr,
                minWidth:72,borderTop:topBorder,
                borderRight:"1px solid #00000015",
                letterSpacing:"0.3px",
                borderBottom:isLastOfCombo?botBorder:"none"
              }},isYrFirst?yr:label),
              /* 점수 셀 */
              ...allScores.map(sc=>{
                const val=gv(sub,dept,yr,pass,sc);
                const st=cellSt(val,pass,yr);
                return e("td",{key:sc,style:{
                  ...st,
                  padding:"2px 1px",textAlign:"center",fontSize:10,
                  minWidth:30,height:18,
                  borderTop:topBorder,
                  borderBottom:isLastOfCombo?botBorder:"none",
                  borderLeft:"1px solid #E2E8F0",
                  /* 점수대 세로 구분선 강조 (0.5 단위마다) */
                  borderLeftColor: Math.round(sc*10)%5===0?"#94A3B8":"#E2E8F0",
                  borderLeftWidth: Math.round(sc*10)%5===0?"1.5px":"1px"
                }},val>0?val:"");
              })
            ].filter(Boolean));
          })
        )
      )
    ])
  );
}

function ChartView({chartData,series,selYears,showPass,showFail,chartType,setChartType,combos,allScores,gv,scoreLabel}){
  const summaries=combos.map(({sub,dept})=>{
    const byYr={};
    YEARS.filter(y=>selYears.includes(y)).forEach(yr=>{
      let p=0,f=0;
      allScores.forEach(sc=>{p+=gv(sub,dept,yr,"pass",sc);f+=gv(sub,dept,yr,"fail",sc);});
      byYr[yr]={p,f};
    });
    return {sub,dept,byYr};
  });
  const bS=(a,c)=>({padding:"4px 12px",borderRadius:6,border:a?"none":"1px solid #D1D5DB",
    cursor:"pointer",fontSize:11,fontWeight:700,background:a?c:"#fff",color:a?"#fff":"#374151",
    boxShadow:a?"0 1px 4px "+c+"55":"none"});
  return e("div",null,[
    e("div",{key:"ctrl",style:{display:"flex",gap:8,marginBottom:12,alignItems:"center"}},[
      e("button",{key:"b",onClick:()=>setChartType("bar"),style:bS(chartType==="bar","#0F766E")},"막대"),
      e("button",{key:"l",onClick:()=>setChartType("line"),style:bS(chartType==="line","#0F766E")},"라인"),
      e("span",{key:"h",style:{fontSize:11,color:"#64748B",marginLeft:4}},`전체 모집단위 합산 | X: ${scoreLabel}`)
    ]),
    e("div",{key:"chart",style:{background:"#fff",borderRadius:12,padding:"12px 8px",
      border:"1px solid #E2E8F0",marginBottom:16,boxShadow:"0 1px 4px #00000010"}},
      e(SvgChart,{data:chartData,series,scoreLabel,type:chartType})),
    e("div",{key:"sl",style:{fontSize:12,fontWeight:700,color:"#374151",marginBottom:10}},"모집단위별 요약"),
    e("div",{key:"cards",style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:8}},
      summaries.map(({sub,dept,byYr})=>e("div",{key:sub+dept,style:{
        background:"#fff",borderRadius:10,padding:"10px 12px",
        border:"1px solid #E2E8F0",boxShadow:"0 1px 3px #00000010"}},[
        e("div",{key:"s",style:{fontSize:11,fontWeight:700,color:"#1D4ED8",marginBottom:2}},sub),
        e("div",{key:"d",style:{fontSize:10,color:"#64748B",marginBottom:8}},dept),
        e("div",{key:"ys",style:{display:"flex",gap:5,flexWrap:"wrap"}},
          YEARS.filter(y=>selYears.includes(y)).map(yr=>e("div",{key:yr,style:{
            fontSize:10,background:"#F8FAFC",borderRadius:6,padding:"3px 8px",
            border:"1px solid #E2E8F0"}},[
            e("span",{key:"y",style:{color:YC[yr].p,fontWeight:700}},yr),
            showPass&&e("span",{key:"p",style:{color:YC[yr].p,marginLeft:3}},`합${byYr[yr]?.p||0}`),
            showFail&&e("span",{key:"f",style:{color:YC[yr].f,marginLeft:3}},`불${byYr[yr]?.f||0}`)
          ]))
        )
      ]))
    )
  ]);
}

ReactDOM.createRoot(document.getElementById("root")).render(e(App));

</script>
</body>
